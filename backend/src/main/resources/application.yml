spring:
  application:
    name: falcim-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/falcim}
    username: ${DB_USER:falcim}
    password: ${DB_PASSWORD:falcim_local_dev}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate        # şemayı Flyway yönetir; Hibernate yalnızca doğrular
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 6MB        # fincan görseli için üst sınır
      max-request-size: 8MB

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health        # yalnızca health dışa açık
  endpoint:
    health:
      show-details: never

# --- Uygulamaya özel yapılandırma ---
falcim:
  jwt:
    secret: ${JWT_SECRET:degistir-bu-en-az-32-karakterlik-guclu-bir-gizli-anahtar-olmali}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:14}
    issuer: falcim
  claude:
    base-url: https://api.anthropic.com
    api-key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-sonnet-4-6}
    version: "2023-06-01"
    max-tokens: 1024
    timeout-seconds: 45
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  quota:
    free-daily-limit: 3
  ratelimit:
    auth-per-minute: 10         # IP başına giriş/kayıt denemesi
    ai-per-minute: 6            # kullanıcı başına AI okuma isteği

springdoc:
  swagger-ui:
    enabled: false              # profillerde override edilir

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: false

springdoc:
  swagger-ui:
    enabled: true               # Swagger UI yalnızca dev'de açık

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

server:
  # prod'da ters proxy (TLS sonlandırma) arkasında X-Forwarded-* başlıklarına güven
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
